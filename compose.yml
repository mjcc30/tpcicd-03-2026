version: '3.8'

services:
  back:
    build: 
      context: ./back
      dockerfile: Dockerfile
    container_name: tp_cicd_back
    ports:
      - "3001:8080"
    environment:
      - NODE_ENV=development

  front:
    build: 
      context: ./front
      dockerfile: Dockerfile
    container_name: tp_cicd_front
    ports:
      - "3000:80"
    depends_on:
      - back
