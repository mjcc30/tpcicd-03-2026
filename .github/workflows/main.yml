name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-ci-cd:
    name: Frontend CI/CD
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './front/package-lock.json'

      - name: Installation des dépendances
        run: npm install

      - name: Tests Unitaires
        run: npm run test-unit

      - name: Tests Fonctionnels
        run: npm run test-functional

      - name: Build de l'application
        run: npm run build

      - name: Déploiement Netlify (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './front/build'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }} # Personal access tokens
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }} # project-details

  backend-ci-cd:
    name: Backend CI/CD
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./back

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './back/package-lock.json'

      - name: Installation des dépendances
        run: npm install

      - name: Tests Unitaires
        run: npm run test-unit

      - name: Tests Fonctionnels
        run: npm run test-functional
